# @package _global_

# to execute this experiment run:
# uv run src/train.py experiment=pom_hydrid_jpeg

defaults:
  - /encoder@module.net.encoder: hybrid_local
  - override /datamodule: jpeg

datamodule:
  prefetch_factor: 2

allow_memory_efficient_backend: True

# Remember to define experiment_name and tags in all your experiments!
# First tag options: data, explore, baseline, ablate, hyperparam, final, <custom tag>
# Second tag options: train, pre-train, post-train, debug, <custom tag>
experiment_name: "hybrid_local_jpeg"
tags: ["final", "train"]
