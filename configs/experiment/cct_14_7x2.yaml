# @package _global_

# to execute this experiment run:
# uv run src/train.py experiment=cct_14_7x2

defaults:
  - override /module: cct_14_7x2
  - override /trainer: imagenet_vit_s_16

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

seed: 42

trainer:
  precision: 32

module:
  compile: false

# Remember to define experiment_name and tags in all your experiments!
# First tag options: data, explore, baseline, ablate, hyperparam, final, <custom tag>
# Second tag options: train, pre-train, post-train, debug, <custom tag>
experiment_name: "cct_14_7x2"
tags: ["explore", "train"]
