# @package _global_

# ViT-S/16 trained with the Muon optimizer (Muon on hidden weight matrices,
# AdamW on embeddings / head / gains & biases).
# to execute this experiment run:
#   uv run src/train.py experiment=muon

defaults:
  - override /module: vit_s_16_muon
  - override /datamodule: default_q50

seed: 42

# Remember to define experiment_name and tags in all your experiments!
# First tag options: data, explore, baseline, ablate, hyperparam, final, <custom tag>
# Second tag options: train, pre-train, post-train, debug, <custom tag>
experiment_name: "muon"
tags: ["explore", "train"]

datamodule:
  num_workers_train: 2
