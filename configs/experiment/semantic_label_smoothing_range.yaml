# @package _global_

# Semantic label smoothing applied only within a specific epoch window
# [start_epoch, end_epoch). Bounds may be absolute epoch indices (int) or
# fractions of `trainer.max_epochs` (float in (0, 1)).
# to execute this experiment run:
#   uv run src/train.py experiment=semantic_label_smoothing_range

defaults:
  - override /datamodule: default_q50

module:
  _target_: src.modules.semantic_label_smoothing.SemanticLabelSmoothingImageNetModule
  semantic_label_smoothing:
    _target_: src.modules.semantic_label_smoothing.SemanticLabelSmoothing
    alpha: 0.1
    num_classes: 1000
    start_epoch: 0.0
    end_epoch: 1.0
    matrix_path: ${paths.data_dir}/semantic_label_smoothing_matrix.pt
    train_dir: ${datamodule.data_path}/${datamodule.train_dir}
    metric: path
    distribution: normalized
    temperature: 1.0

seed: 42

# Remember to define experiment_name and tags in all your experiments!
# First tag options: data, explore, baseline, ablate, hyperparam, final, <custom tag>
# Second tag options: train, pre-train, post-train, debug, <custom tag>
experiment_name: "semantic_label_smoothing_range"
tags: ["explore", "train"]
