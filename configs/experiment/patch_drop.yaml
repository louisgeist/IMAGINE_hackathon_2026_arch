# @package _global_

# to execute this experiment run:
# uv run src/train.py experiment=patch_drop

defaults:
  - override /trainer: imagenet_vit_s_16

seed: 42

module:
  patch_drop_rate_start: 0.75
  patch_drop_rate_end: 0.0
  patch_drop_rate_end_epoch: 15
  patch_drop_schedule: "linear" # "linear" or "cosine"
  patch_drop_update_every: 3 # epochs between patch drop rate updates (avoids a torch.compile recompile every epoch)
  compile_dynamic: null # set to true to let torch.compile trace the token dimension as dynamic instead
  net:
    # patch dropping lives in this subclass only; the shared VisionTransformer is untouched
    _target_: src.modules.nets.patch_drop_vit.PatchDropVisionTransformer
    patch_drop_mode: "random" # "random" or "grid" (nested grids of patches, like increasing resolution little by little.)

experiment_name: "patch_drop"
tags: ["ablate", "train"]
