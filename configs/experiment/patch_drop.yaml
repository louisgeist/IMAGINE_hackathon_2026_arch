# @package _global_

# to execute this experiment run:
# uv run src/train.py experiment=patch_drop

defaults:
  - override /trainer: imagenet_vit_s_16

seed: 42

module:
  patch_drop_rate_start: 0.75
  patch_drop_rate_end: 0.0
  patch_drop_rate_end_epoch: 15
  patch_drop_schedule: "linear" # "linear" or "cosine"
  net:
    patch_drop_mode: "random" # "random" or "grid" (nested grids of patches, like increasing resolution little by little.)

experiment_name: "patch_drop"
tags: ["ablate", "train"]
