_target_: src.modules.imagenet_module.ImageNetModule

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 1e-3
  weight_decay: 1e-4

main_scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    _partial_: true
    T_max: null # Requires knowing total number of training steps, initialized in train.py
    eta_min: 0

warmup_steps: 1e4

warmup_scheduler:
    _target_: torch.optim.lr_scheduler.LinearLR
    _partial_: true
    start_factor: 1e-2
    total_iters: ${module.warmup_steps}

# CCT-14/7x2
net:
  _target_: src.modules.nets.compact_convolutional_transformer.CompactConvolutionalTransformer
  image_size: 224
  num_layers: 14
  num_heads: 6
  hidden_dim: 384
  mlp_dim: 1536
  num_conv_layers: 2
  kernel_size: 7
  stride: 2
  padding: 3
  pooling_kernel_size: 3
  pooling_stride: 2
  pooling_padding: 1
