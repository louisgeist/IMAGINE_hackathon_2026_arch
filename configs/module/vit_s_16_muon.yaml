defaults:
 - vit_s_16.yaml


_target_: src.modules.imagenet_muon_module.ImageNetMuonModule

# Muon optimizes the hidden weight matrices of the ViT encoder; an auxiliary
# AdamW optimizes the patch embedding, positional embeddings, class token,
# classifier head and all 1D gains/biases. Parameters are split automatically
# inside `build_muon_optimizer`, which returns a single MuonWithAuxAdam.
optimizer:
  _target_: src.modules.optim.muon.build_muon_optimizer
  _partial_: true
  muon_lr: 0.02
  muon_momentum: 0.95
  muon_weight_decay: 0.01
  adamw_lr: 3e-4
  adamw_betas: [0.9, 0.95]
  adamw_eps: 1e-10
  adamw_weight_decay: 0.01

