defaults:
 - vit_s_16.yaml
 - override optimizer: muon

# The Muon optimizer (Muon on hidden weight matrices, auxiliary AdamW on
# embeddings / head / gains & biases) is selected as a config group above so it
# fully replaces the base AdamW optimizer instead of merging with it.
_target_: src.modules.imagenet_muon_module.ImageNetMuonModule

